{% extends 'base.html' %}

{% block title %}Список сообщений{% endblock %}

{% block content %}
<h1>Сообщения:</h1>
<table class="table table-striped">
    <thead>
        <tr>
            <th scope="col">Название</th>
            <th scope="col">Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for msg in messages %}
        <tr>
            <td>{{ msg.subject }}</td>
            <td><a href="{% url 'edit_message' msg.id %}" class="btn btn-primary">Редактировать</a> 
                <a href="{% url 'delete_message' msg.id %}" onclick="return confirm('Удалить сообщение?');" class="btn btn-danger">Удалить</a></td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="2">Нет сообщений.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
<a href="{% url 'add_message' %}" class="btn btn-success">Добавить сообщение</a>
{% endblock %}
